services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-boilerplate-app
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 9091
    ports:
      - "9091:9091"
    depends_on:
      - mysql
      - redis
      - minio
      - mailhog

  mysql:
    image: mysql:8.0
    container_name: springboot-boilerplate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: boilerplate_db
      MYSQL_USER: boilerplate
      MYSQL_PASSWORD: boilerplate
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql  # 최초 실행 시 테이블 자동 생성
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0
    container_name: springboot-boilerplate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: springboot-boilerplate-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO 웹 콘솔 (http://localhost:9001)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: springboot-boilerplate-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # 웹 UI (http://localhost:8025)

  prometheus:
    image: prom/prometheus:latest
    container_name: springboot-boilerplate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: springboot-boilerplate-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
