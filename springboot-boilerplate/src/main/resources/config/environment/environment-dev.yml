# JWT 설정
jwt:
  secret: change-me-dev-jwt-secret-key-must-be-at-least-256-bits-long
  access-token-validity-ms: 7200000    # 2시간
  refresh-token-validity-ms: 604800000 # 7일

# SpringDoc 설정
springdoc:
  api-docs:
    path: /api-docs
    groups:
      enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    groups-order: asc
    tags-sorter: alpha
    operations-sorter: alpha
    filter: true
    display-request-duration: true
    doc-expansion: none
  cache:
    disabled: true
  override-with-generic-response: false
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8

# AWS 설정
aws:
  s3:
    region: ap-northeast-2
    bucket-name: your-dev-bucket-name
    presigned-url-expiry-minutes: 5
